<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverTwin Storage Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

    <!-- AUTH SECTION -->
    <div id="login-section">
        <div class="auth-header">
            <h1>CleverTwin</h1>
            <p>Storage Monitor</p>
        </div>

        <div class="auth-card">
            <!-- TABS -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="tab-login" class="tab-content">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
                <p id="login-error" class="error"></p>
            </div>

            <!-- REGISTER FORM -->
            <div id="tab-register" class="tab-content" style="display:none">
                <input type="text" id="reg-company" placeholder="Company name">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Password">
                <button onclick="registerCompany()">Create account</button>
                <p id="register-message" class="error"></p>
            </div>
        </div>
    </div>

    <!-- EVENTS SECTION -->
    <div id="events-section" style="display:none">
        <div class="header-bar">
            <div>
                <h1>Storage Monitor</h1>
                <h2>Company: <span id="company-name"></span></h2>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Company</th>
                    <th>Event Type</th>
                    <th>File Size (MB)</th>
                    <th>File Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="events-body"></tbody>
        </table>

        <!-- NEW EVENT FORM -->
        <div class="new-event-card">
            <h2>Register New Event</h2>
            <div class="form-row">
                <select id="new-event-type">
                    <option value="upload">Upload</option>
                    <option value="download">Download</option>
                    <option value="delete">Delete</option>
                </select>
                <select id="new-file-type">
                    <option value="pointcloud">Point Cloud</option>
                    <option value="360image">360 Image</option>
                    <option value="orthophoto">Orthophoto</option>
                </select>
                <input type="number" id="new-file-size" placeholder="File Size (MB)">
                <button onclick="registerEvent()">Register</button>
            </div>
            <p id="create-error" class="error"></p>
        </div>
    </div>

</div>
<script src="app.js"></script>
</body>
</html>
